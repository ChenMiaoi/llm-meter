name: Feature request
description: Suggest a provider, desktop integration, metric, or product improvement.
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow is difficult or unavailable today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the desired user experience and any relevant provider, desktop, or top-bar details.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: scope
    attributes:
      label: Affected areas
      options:
        - label: Provider adapter
        - label: Local Codex accounting
        - label: Noctalia / top bar
        - label: Desktop app
        - label: CLI / installer
        - label: Storage / privacy

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and discussions for similar requests.
          required: true
