name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-24.04
    container: archlinux:base-devel
    env:
      PATH: /usr/lib/qt6/bin:/usr/local/sbin:/usr/local/bin:/usr/bin
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            dbus \
            git \
            pkgconf \
            qt6-declarative \
            rustup

      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check QML formatting and syntax
        shell: bash
        run: |
          set -euo pipefail
          qml_files=(
            crates/cli/assets/noctalia/Main.qml
            crates/cli/assets/noctalia/BarWidget.qml
            crates/cli/assets/noctalia/Panel.qml
          )
          for file in "${qml_files[@]}"; do
            diff -u "$file" <(qmlformat "$file")
          done
          qmllint \
            --import info \
            --unqualified info \
            --required info \
            --signal-handler-parameters info \
            --unresolved-type info \
            "${qml_files[@]}"

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Verify publishable package contents
        shell: bash
        run: |
          set -euo pipefail
          packages=(
            llm-meter-core
            llm-meter-storage
            llm-meter-secret-store
            llm-meter-provider-openai
            llm-meter-provider-kimi
            llm-meter-relay-proxy
            llm-meter-provider-relay
            llm-meter-provider-testkit
            llm-meter-daemon
            llm-meter-cli
          )
          for package in "${packages[@]}"; do
            cargo package --locked --allow-dirty --list -p "$package" >/dev/null
          done
          cargo package --locked --allow-dirty -p llm-meter-core

      - name: Check distributable integration assets
        shell: bash
        run: |
          set -euo pipefail
          for file in manifest.json Main.qml BarWidget.qml Panel.qml; do
            cmp "crates/cli/assets/noctalia/$file" "packaging/noctalia/llm-meter/$file"
          done
          for file in llm-meter.lua llm-meter.conf; do
            cmp "crates/cli/assets/hyprland/$file" "packaging/hyprland/$file"
          done

  desktop:
    name: Tauri desktop
    runs-on: ubuntu-24.04
    container: archlinux:base-devel
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            git \
            libappindicator \
            librsvg \
            patchelf \
            rustup \
            webkit2gtk-4.1

      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check desktop application
        run: cargo check --locked --manifest-path apps/desktop/src-tauri/Cargo.toml
