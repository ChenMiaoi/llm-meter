windowrule {
    name = llm-meter-popup
    match:class = ^(llm-meter-desktop|io\.github\.llmmeter)$
    match:title = ^LLM Meter Popup$

    float = on
    size = 360 440
    move = (monitor_w-window_w-12) 42
    no_max_size = on
    focus_on_activate = on
    animation = popin 90%
}

bind = SUPER SHIFT, M, exec, llm-meter ui --toggle
